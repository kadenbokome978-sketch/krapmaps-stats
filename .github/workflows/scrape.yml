name: KrapMaps Stats Scraper
on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours — keeps workflow alive + more frequent updates
  workflow_dispatch:          # Manual trigger always available
  push:
    branches: [main]          # Runs on push too — prevents GitHub disabling it
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install cryptography requests
      - name: Run scraper
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python tiktok_scraper.py
      - name: Commit stats
        run: |
          git config user.name "KrapMaps Bot"
          git config user.email "bot@krapmaps.app"
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > last_run.txt
          git add krapmaps_stats.json last_run.txt
          git commit -m "stats: auto update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
